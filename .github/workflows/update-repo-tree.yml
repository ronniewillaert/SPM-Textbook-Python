name: Update repository tree
permissions:
  contents: write
on:
  push:
    branches: [ main ]

jobs:
  update-tree:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tree
        run: sudo apt-get install tree

      - name: Generate repository tree
        run: |
          tree -I '.git|__pycache__|*.ipynb_checkpoints' -L 3 > repo_tree.txt

      - name: Insert tree into README
        run: |
          awk '
          /<!-- repo-tree-start -->/ {
              print;
              print "";
              print "```";
              while ((getline line < "repo_tree.txt") > 0) print line;
              print "```";
              skip=1;
              next
          }
          /<!-- repo-tree-end -->/ { skip=0 }
          !skip
          ' README.md > README_new.md
          mv README_new.md README.md

      - name: Commit updated README
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add README.md
          git commit -m "Update repository tree" || echo "No changes"
          git push
